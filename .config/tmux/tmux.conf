set -g prefix C-a
unbind C-b
bind C-a send-prefix

if-shell 'test -x /Users/yg_jung/.nix-profile/bin/fish' 'set -g default-shell /Users/yg_jung/.nix-profile/bin/fish'
if-shell 'test ! -x /Users/yg_jung/.nix-profile/bin/fish && test -x /opt/homebrew/bin/fish' 'set -g default-shell /opt/homebrew/bin/fish'
if-shell 'test ! -x /Users/yg_jung/.nix-profile/bin/fish && test ! -x /opt/homebrew/bin/fish && test -x /usr/local/bin/fish' 'set -g default-shell /usr/local/bin/fish'
set -gu default-command

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off

set -g mouse on
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g extended-keys on
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,●,○} #T "
set -g pane-border-style "fg=#5c6370"
set -g pane-active-border-style "fg=#98c379"
set -g pane-status-style "fg=#7f848e,bg=default"
set -g pane-status-current-style "fg=#111111,bg=#98c379,bold"
setw -gu window-style
setw -gu window-active-style

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",tmux-256color:RGB"
set -sa terminal-features ",*:hyperlinks"
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 30
set -g status-right-length 60

bind | split-window -h
bind - split-window -v
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

setw -g mode-keys vi
